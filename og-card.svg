      <stop stop-color="#100907"/>
      <stop offset="0.5" stop-color="#1B0F0B"/>
      <stop offset="1" stop-color="#08090D"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
